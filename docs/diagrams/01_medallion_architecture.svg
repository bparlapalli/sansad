<svg width="800" height="480" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <title>ParamaSrota — Medallion Architecture Per Source</title>
  <desc>Each data source has its own Bronze/Silver/Gold medallion stack. All gold layers feed a shared intelligence graph.</desc>

  <rect width="800" height="480" fill="#0f1117"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#e2e8f0" letter-spacing="0.04em">MEDALLION ARCHITECTURE — ONE STACK PER SOURCE</text>

  <!-- Source boxes -->
  <g fill="#1e2532" stroke="#3d4a5e" stroke-width="1">
    <rect x="30"  y="58" width="100" height="38" rx="6"/>
    <rect x="148" y="58" width="90"  height="38" rx="6"/>
    <rect x="256" y="58" width="90"  height="38" rx="6"/>
    <rect x="364" y="58" width="90"  height="38" rx="6"/>
    <rect x="472" y="58" width="70"  height="38" rx="6"/>
    <rect x="560" y="58" width="60"  height="38" rx="6"/>
    <rect x="638" y="58" width="132" height="38" rx="6"/>
  </g>
  <g text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8">
    <text x="80"  y="82">Parliament</text>
    <text x="193" y="82">Courts</text>
    <text x="301" y="82">YouTube</text>
    <text x="409" y="82">Tenders</text>
    <text x="507" y="82">News</text>
    <text x="590" y="82">MCA</text>
    <text x="704" y="82">+ sources</text>
  </g>

  <!-- Arrows down -->
  <g stroke="#3d4a5e" stroke-width="1.5" marker-end="url(#arr)">
    <line x1="80"  y1="96"  x2="290" y2="148"/>
    <line x1="193" y1="96"  x2="310" y2="148"/>
    <line x1="301" y1="96"  x2="340" y2="148"/>
    <line x1="409" y1="96"  x2="370" y2="148"/>
    <line x1="507" y1="96"  x2="410" y2="148"/>
    <line x1="590" y1="96"  x2="430" y2="148"/>
    <line x1="704" y1="96"  x2="450" y2="148"/>
  </g>

  <!-- BRONZE -->
  <rect x="60" y="148" width="680" height="72" rx="10" fill="#2d1a0e" stroke="#8b4513" stroke-width="1.5"/>
  <text x="400" y="176" text-anchor="middle" font-size="14" font-weight="700" fill="#cd853f">Bronze — raw ingestion</text>
  <text x="400" y="196" text-anchor="middle" font-size="12" fill="#a0785a">HTML / JSON / PDF as-is · timestamp · source URL · scrape run ID · zero transformation</text>
  <text x="400" y="212" text-anchor="middle" font-size="12" fill="#a0785a">Current: sansad.db → source_pdfs table (parse_status = pending)</text>

  <!-- Arrow -->
  <line x1="400" y1="220" x2="400" y2="252" stroke="#3d4a5e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- SILVER -->
  <rect x="60" y="252" width="680" height="72" rx="10" fill="#1a2212" stroke="#4a7c3f" stroke-width="1.5"/>
  <text x="400" y="280" text-anchor="middle" font-size="14" font-weight="700" fill="#6dbf5e">Silver — cleaned and typed</text>
  <text x="400" y="300" text-anchor="middle" font-size="12" fill="#7aaa6e">Parsed fields · typed schema · deduped · normalised names · null handling</text>
  <text x="400" y="316" text-anchor="middle" font-size="12" fill="#7aaa6e">Current: statements + members tables · DBT models layer on top in Snowflake</text>

  <!-- Arrow -->
  <line x1="400" y1="324" x2="400" y2="356" stroke="#3d4a5e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- GOLD -->
  <rect x="60" y="356" width="680" height="72" rx="10" fill="#1a1a0a" stroke="#8b7a00" stroke-width="1.5"/>
  <text x="400" y="384" text-anchor="middle" font-size="14" font-weight="700" fill="#d4af37">Gold — entity resolved, graph-ready</text>
  <text x="400" y="404" text-anchor="middle" font-size="12" fill="#b8962a">Canonical politician_id · company_id · case_id · ready to JOIN across sources</text>
  <text x="400" y="420" text-anchor="middle" font-size="12" fill="#b8962a">Snowflake: gold_politicians · gold_companies · gold_cases · gold_tenders</text>

  <!-- Arrow -->
  <line x1="400" y1="428" x2="400" y2="452" stroke="#3d4a5e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Shared graph -->
  <rect x="180" y="452" width="440" height="20" rx="6" fill="#1e1040" stroke="#6c5ce7" stroke-width="1.5"/>
  <text x="400" y="466" text-anchor="middle" font-size="12" font-weight="600" fill="#a29bfe">Shared intelligence graph — all gold layers join here via entity IDs</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3d4a5e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
