<svg width="800" height="720" viewBox="0 0 800 720" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <title>ParamaSrota — Intelligence Intersection Layers</title>
  <desc>Gold layers join pairwise to create new intelligence signals. Triple joins produce emergent signals invisible in any single source.</desc>

  <rect width="800" height="720" fill="#0f1117"/>

  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4a5568" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="15" font-weight="600" fill="#e2e8f0" letter-spacing="0.04em">INTELLIGENCE INTERSECTION LAYERS</text>

  <!-- GOLD SOURCES -->
  <text x="400" y="60" text-anchor="middle" font-size="11" font-weight="500" fill="#64748b" letter-spacing="0.06em">GOLD LAYER SOURCES</text>

  <rect x="40"  y="70" width="160" height="52" rx="8" fill="#0f2a1a" stroke="#2d6a4f" stroke-width="1.5"/>
  <text x="120" y="92"  text-anchor="middle" font-size="13" font-weight="700" fill="#52b788">Politician gold</text>
  <text x="120" y="110" text-anchor="middle" font-size="11" fill="#74c69d">ID · party · constituency · votes</text>

  <rect x="320" y="70" width="160" height="52" rx="8" fill="#0f2a1a" stroke="#2d6a4f" stroke-width="1.5"/>
  <text x="400" y="92"  text-anchor="middle" font-size="13" font-weight="700" fill="#52b788">Court gold</text>
  <text x="400" y="110" text-anchor="middle" font-size="11" fill="#74c69d">Case ID · parties · verdict · date</text>

  <rect x="600" y="70" width="160" height="52" rx="8" fill="#0f2a1a" stroke="#2d6a4f" stroke-width="1.5"/>
  <text x="680" y="92"  text-anchor="middle" font-size="13" font-weight="700" fill="#52b788">Tender gold</text>
  <text x="680" y="110" text-anchor="middle" font-size="11" fill="#74c69d">Contract · winner · value · ministry</text>

  <!-- PAIRWISE SECTION -->
  <text x="400" y="152" text-anchor="middle" font-size="11" font-weight="500" fill="#64748b" letter-spacing="0.06em">PAIRWISE JOINS — EACH IS A NEW SIGNAL</text>

  <!-- Dashed drop lines -->
  <g stroke="#2d3748" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr2)">
    <line x1="120" y1="122" x2="120" y2="162"/>
    <line x1="400" y1="122" x2="400" y2="162"/>
    <line x1="680" y1="122" x2="680" y2="162"/>
  </g>

  <!-- Pairwise boxes -->
  <rect x="20"  y="162" width="230" height="100" rx="10" fill="#1a0f2e" stroke="#6c5ce7" stroke-width="1.5"/>
  <text x="135" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="#a29bfe">Politician + Courts</text>
  <text x="135" y="203" text-anchor="middle" font-size="11" fill="#9188e8">Criminal exposure score</text>
  <text x="135" y="219" text-anchor="middle" font-size="11" fill="#9188e8">Pending cases + bail history</text>
  <text x="135" y="235" text-anchor="middle" font-size="11" fill="#9188e8">Family members in litigation</text>
  <text x="135" y="251" text-anchor="middle" font-size="11" fill="#9188e8">Cases filed after election win</text>

  <rect x="285" y="162" width="230" height="100" rx="10" fill="#1a0f2e" stroke="#6c5ce7" stroke-width="1.5"/>
  <text x="400" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="#a29bfe">Courts + Tenders</text>
  <text x="400" y="203" text-anchor="middle" font-size="11" fill="#9188e8">Blacklisted bidders still winning</text>
  <text x="400" y="219" text-anchor="middle" font-size="11" fill="#9188e8">Dispute pattern by ministry</text>
  <text x="400" y="235" text-anchor="middle" font-size="11" fill="#9188e8">Litigious companies in active bids</text>
  <text x="400" y="251" text-anchor="middle" font-size="11" fill="#9188e8">Case outcome → re-award pattern</text>

  <rect x="550" y="162" width="230" height="100" rx="10" fill="#1a0f2e" stroke="#6c5ce7" stroke-width="1.5"/>
  <text x="665" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="#a29bfe">Politician + Tenders</text>
  <text x="665" y="203" text-anchor="middle" font-size="11" fill="#9188e8">Constituency award flows</text>
  <text x="665" y="219" text-anchor="middle" font-size="11" fill="#9188e8">Related-party company wins</text>
  <text x="665" y="235" text-anchor="middle" font-size="11" fill="#9188e8">Ministry proximity score</text>
  <text x="665" y="251" text-anchor="middle" font-size="11" fill="#9188e8">Tender value vs stated assets</text>

  <!-- TRIPLE JOIN -->
  <text x="400" y="290" text-anchor="middle" font-size="11" font-weight="500" fill="#64748b" letter-spacing="0.06em">TRIPLE JOIN — EMERGENT INTELLIGENCE INVISIBLE IN ANY SINGLE SOURCE</text>

  <g stroke="#2d3748" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr2)">
    <line x1="135" y1="262" x2="230" y2="302"/>
    <line x1="400" y1="262" x2="400" y2="302"/>
    <line x1="665" y1="262" x2="570" y2="302"/>
  </g>

  <rect x="100" y="302" width="600" height="110" rx="12" fill="#2d0a0a" stroke="#e53e3e" stroke-width="1.5"/>
  <text x="400" y="326" text-anchor="middle" font-size="14" font-weight="700" fill="#fc8181">Politician + Courts + Tenders</text>
  <text x="400" y="348" text-anchor="middle" font-size="12" fill="#feb2b2">Politician has fraud case → linked company wins tender → case is dismissed</text>
  <text x="400" y="366" text-anchor="middle" font-size="12" fill="#feb2b2">Company director is politician's relative → same company wins 8 tenders in politician's ministry</text>
  <text x="400" y="384" text-anchor="middle" font-size="12" fill="#feb2b2">Politician votes against defence bill → constituency gets no defence contracts for 5 years</text>
  <text x="400" y="402" text-anchor="middle" font-size="11" font-weight="600" fill="#f56565">This signal exists NOWHERE — it only appears at the intersection</text>

  <!-- YOUTUBE + NEWS LAYER -->
  <text x="400" y="440" text-anchor="middle" font-size="11" font-weight="500" fill="#64748b" letter-spacing="0.06em">ADD YOUTUBE + NEWS — THE SIGNAL BECOMES PUBLIC NARRATIVE</text>

  <line x1="400" y1="412" x2="400" y2="450" stroke="#2d3748" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr2)"/>

  <rect x="60" y="450" width="680" height="90" rx="12" fill="#1a1400" stroke="#d69e2e" stroke-width="1.5"/>
  <text x="400" y="474" text-anchor="middle" font-size="14" font-weight="700" fill="#f6e05e">+ YouTube + News layer</text>
  <text x="400" y="494" text-anchor="middle" font-size="12" fill="#ecc94b">Politician publicly denies knowing company → graph shows 6 tender awards to that company</text>
  <text x="400" y="512" text-anchor="middle" font-size="12" fill="#ecc94b">News quotes politician on "clean governance" → court record shows active bribery case</text>
  <text x="400" y="530" text-anchor="middle" font-size="11" font-weight="600" fill="#faf089">Statement vs record gap = the monetizable product</text>

  <!-- FINAL NODE -->
  <line x1="400" y1="540" x2="400" y2="568" stroke="#2d3748" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr2)"/>

  <rect x="120" y="568" width="560" height="118" rx="12" fill="#111827" stroke="#4a5568" stroke-width="1.5"/>
  <text x="400" y="592" text-anchor="middle" font-size="14" font-weight="700" fill="#e2e8f0">Intelligence node — one politician, all sources</text>
  <text x="400" y="612" text-anchor="middle" font-size="12" fill="#94a3b8">Votes cast · cases filed · tenders to linked companies · YouTube statements</text>
  <text x="400" y="630" text-anchor="middle" font-size="12" fill="#94a3b8">News quotes · claim accuracy score · influence graph: ministry → company → director</text>
  <text x="400" y="648" text-anchor="middle" font-size="12" fill="#94a3b8">Risk score · transparency score · pattern flags · network centrality</text>
  <text x="400" y="668" text-anchor="middle" font-size="11" font-weight="600" fill="#6c5ce7">Stored in Snowflake — served via FastAPI — displayed on politician profile page</text>
  <text x="400" y="686" text-anchor="middle" font-size="11" fill="#4a5568">Last 7 days free · historical + network = paid tier</text>
</svg>
