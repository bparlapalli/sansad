<svg width="800" height="580" viewBox="0 0 800 580" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <title>ParamaSrota — Production Architecture</title>

  <rect width="800" height="580" fill="#0f1117"/>

  <defs>
    <marker id="arr4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4a5568" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr4b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="400" y="34" text-anchor="middle" font-size="15" font-weight="600" fill="#e2e8f0" letter-spacing="0.04em">PRODUCTION ARCHITECTURE</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#64748b">Postgres app layer (fast/free) · Snowflake intelligence layer (deep/paid)</text>

  <!-- SCRAPERS -->
  <text x="400" y="80" text-anchor="middle" font-size="11" font-weight="500" fill="#64748b" letter-spacing="0.06em">SCHEDULED SCRAPERS — GITHUB ACTIONS / RAILWAY WORKER</text>

  <g fill="#111827" stroke="#374151" stroke-width="1">
    <rect x="20"  y="88" width="100" height="34" rx="6"/>
    <rect x="132" y="88" width="100" height="34" rx="6"/>
    <rect x="244" y="88" width="100" height="34" rx="6"/>
    <rect x="356" y="88" width="100" height="34" rx="6"/>
    <rect x="468" y="88" width="100" height="34" rx="6"/>
    <rect x="580" y="88" width="100" height="34" rx="6"/>
    <rect x="692" y="88" width="88"  height="34" rx="6"/>
  </g>
  <g text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">
    <text x="70"  y="110">Parliament</text>
    <text x="182" y="110">Courts</text>
    <text x="294" y="110">YouTube</text>
    <text x="406" y="110">Tenders</text>
    <text x="518" y="110">News</text>
    <text x="630" y="110">MCA</text>
    <text x="736" y="110">+more</text>
  </g>

  <!-- Arrow down to bronze -->
  <line x1="400" y1="122" x2="400" y2="146" stroke="#4a5568" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr4)"/>

  <!-- BRONZE (S3/GCS) -->
  <rect x="60" y="146" width="680" height="38" rx="8" fill="#1a0f00" stroke="#78350f" stroke-width="1.5"/>
  <text x="400" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#d97706">Bronze — S3 / GCS raw store</text>
  <text x="400" y="176" text-anchor="middle" font-size="10" fill="#b45309">Raw HTML, PDFs, JSON blobs · immutable · timestamped · never transformed</text>

  <line x1="400" y1="184" x2="400" y2="204" stroke="#4a5568" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr4)"/>

  <!-- TWO PATHS -->
  <!-- LEFT: Postgres app layer -->
  <text x="190" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">APP LAYER (fast queries)</text>

  <rect x="20" y="230" width="360" height="120" rx="10" fill="#0d1117" stroke="#1e3a5f" stroke-width="1.5"/>

  <rect x="36"  y="246" width="156" height="44" rx="6" fill="#0f2235" stroke="#1d4ed8" stroke-width="1"/>
  <text x="114" y="264" text-anchor="middle" font-size="11" font-weight="700" fill="#60a5fa">Postgres (Neon/Supabase)</text>
  <text x="114" y="278" text-anchor="middle" font-size="10" fill="#93c5fd">Silver layer · last 90 days</text>
  <text x="114" y="290" text-anchor="middle" font-size="10" fill="#93c5fd">statements · members · tenders</text>

  <rect x="208" y="246" width="156" height="44" rx="6" fill="#0f2235" stroke="#1d4ed8" stroke-width="1"/>
  <text x="286" y="264" text-anchor="middle" font-size="11" font-weight="700" fill="#60a5fa">FastAPI</text>
  <text x="286" y="278" text-anchor="middle" font-size="10" fill="#93c5fd">GET /politician/{name}</text>
  <text x="286" y="290" text-anchor="middle" font-size="10" fill="#93c5fd">GET /search?q=</text>

  <rect x="36" y="298" width="328" height="40" rx="6" fill="#0a1520" stroke="#1e3a5f" stroke-width="1"/>
  <text x="200" y="314" text-anchor="middle" font-size="11" font-weight="700" fill="#38bdf8">Streamlit app (Python — no frontend needed)</text>
  <text x="200" y="330" text-anchor="middle" font-size="10" fill="#7dd3fc">Politician search · statement viewer · last 7 days free · login for history</text>

  <!-- RIGHT: Snowflake intelligence layer -->
  <text x="610" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">INTELLIGENCE LAYER (deep analysis)</text>

  <rect x="420" y="230" width="360" height="120" rx="10" fill="#0d1117" stroke="#4a3800" stroke-width="1.5"/>

  <rect x="436" y="246" width="156" height="44" rx="6" fill="#1a1200" stroke="#8b7a00" stroke-width="1"/>
  <text x="514" y="264" text-anchor="middle" font-size="11" font-weight="700" fill="#d4af37">Snowflake</text>
  <text x="514" y="278" text-anchor="middle" font-size="10" fill="#b8962a">Full history · gold layer</text>
  <text x="514" y="290" text-anchor="middle" font-size="10" fill="#b8962a">DBT models · time travel</text>

  <rect x="608" y="246" width="156" height="44" rx="6" fill="#1a1200" stroke="#8b7a00" stroke-width="1"/>
  <text x="686" y="264" text-anchor="middle" font-size="11" font-weight="700" fill="#d4af37">Intelligence views</text>
  <text x="686" y="278" text-anchor="middle" font-size="10" fill="#b8962a">Cross-source joins</text>
  <text x="686" y="290" text-anchor="middle" font-size="10" fill="#b8962a">Network graph queries</text>

  <rect x="436" y="298" width="328" height="40" rx="6" fill="#120e00" stroke="#4a3800" stroke-width="1"/>
  <text x="600" y="314" text-anchor="middle" font-size="11" font-weight="700" fill="#f59e0b">Tender BI + political risk reports</text>
  <text x="600" y="330" text-anchor="middle" font-size="10" fill="#fbbf24">Paid tier · B2B API · investor dashboards · email alerts</text>

  <!-- Connect both from bronze -->
  <g stroke="#2563eb" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr4b)">
    <line x1="300" y1="184" x2="200" y2="230"/>
    <line x1="500" y1="184" x2="600" y2="230"/>
  </g>

  <!-- ENTITY RESOLUTION -->
  <text x="400" y="382" text-anchor="middle" font-size="11" font-weight="500" fill="#64748b" letter-spacing="0.06em">ENTITY RESOLUTION LAYER — THE MOAT</text>

  <rect x="100" y="390" width="600" height="52" rx="10" fill="#1a0f2e" stroke="#6c5ce7" stroke-width="1.5"/>
  <text x="400" y="412" text-anchor="middle" font-size="13" font-weight="700" fill="#a29bfe">Canonical ID resolver</text>
  <text x="400" y="430" text-anchor="middle" font-size="11" fill="#9188e8">"Rajnath Singh" = "Sh. Rajnath Singh, MP" = "rajnath_singh" on YT → politician_id: POL_00423</text>
  <text x="400" y="446" text-anchor="middle" font-size="10" fill="#7c6fe8">Fuzzy matching · manual overrides · confidence scores · once built, cannot be replicated cheaply</text>

  <!-- MINIMUM VIABLE LAUNCH -->
  <text x="400" y="482" text-anchor="middle" font-size="11" font-weight="500" fill="#64748b" letter-spacing="0.06em">MINIMUM VIABLE LAUNCH</text>

  <rect x="60" y="490" width="680" height="72" rx="10" fill="#0a1f12" stroke="#2d6a4f" stroke-width="1.5"/>
  <text x="400" y="514" text-anchor="middle" font-size="14" font-weight="700" fill="#52b788">Parliament scraper → Postgres → Streamlit → live politician search</text>
  <text x="400" y="534" text-anchor="middle" font-size="11" fill="#74c69d">Phase 1: Everything in Python. No frontend. Streamlit handles the UI. Ship in 2 weeks.</text>
  <text x="400" y="550" text-anchor="middle" font-size="11" fill="#74c69d">Phase 2: Add Snowflake. DBT models over existing data. Gold layer emerges from what you already have.</text>
</svg>
