  <text x="372" y="460" text-anchor="middle" font-size="10" fill="#93c5fd">Journalists · RTI activists · researchers</text>

  <rect x="496" y="390" width="284" height="72" rx="8" fill="#0d1b2a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="638" y="412" text-anchor="middle" font-size="12" font-weight="700" fill="#60a5fa">B2B ₹2k–50k/mo</text>
