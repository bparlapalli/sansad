  <text x="400" y="128" text-anchor="middle" font-size="11" fill="#9188e8">Politician · Company · Case · Statement · Tender · Quote — all linked via entity IDs</text>

  <line x1="400" y1="138" x2="400" y2="160" stroke="#4a5568" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr3)"/>

