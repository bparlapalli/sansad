  <text x="400" y="600" text-anchor="middle" font-size="13" font-weight="700" fill="#60a5fa">Snowflake as the intelligence backbone</text>
  <text x="400" y="618" text-anchor="middle" font-size="11" fill="#93c5fd">Bronze → Silver → Gold via DBT · cross-source joins as views · historical archive · time-travel</text>
  <text x="400" y="634" text-anchor="middle" font-size="11" fill="#93c5fd">Free tier (app) reads Postgres · paid tier reads Snowflake directly or via API</text>
