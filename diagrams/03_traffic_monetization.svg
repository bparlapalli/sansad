  <rect x="60" y="506" width="680" height="48" rx="10" fill="#1a0f2e" stroke="#6c5ce7" stroke-width="1.5"/>
  <text x="400" y="526" text-anchor="middle" font-size="13" font-weight="700" fill="#a29bfe">More sources scraped → richer graph → better pages → more SEO traffic</text>
  <text x="400" y="544" text-anchor="middle" font-size="11" fill="#9188e8">Traffic builds trust · trust unlocks B2B · B2B funds infra · infra enables more sources</text>

  <!-- SNOWFLAKE NOTE -->
