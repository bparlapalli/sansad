  <text x="638" y="446" text-anchor="middle" font-size="10" fill="#93c5fd">Tender alerts · political risk scores</text>
  <text x="638" y="460" text-anchor="middle" font-size="10" fill="#93c5fd">Custom reports · white-label data feeds</text>

  <!-- FLYWHEEL -->
